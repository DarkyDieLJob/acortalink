services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-acortalink}
      POSTGRES_USER: ${DB_USER:-acortalink}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-acortalink} -d ${DB_NAME:-acortalink}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c work_mem=2MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c max_wal_size=1GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=acortador_project.settings
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CACHE_BACKEND=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv sync --frozen --no-dev &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn -c gunicorn.conf.py acortador_project.wsgi:application"

  cron:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=acortador_project.settings
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CACHE_BACKEND=redis
    restart: unless-stopped
    entrypoint: []
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv sync --frozen --no-dev &&
             printf '0 3 * * * cd /app && /app/.venv/bin/python manage.py cleanup_expired_links >> /var/log/cron_cleanup.log 2>&1\\n*/30 * * * * cd /app && /app/.venv/bin/python manage.py ping_seo >> /var/log/cron_ping.log 2>&1\\n*/5 * * * * cd /app && /app/.venv/bin/python manage.py flush_clicks >> /var/log/cron_flush.log 2>&1\\n' > /tmp/crontab.txt &&
             crontab /tmp/crontab.txt &&
             cron -f -L 2"

volumes:
  pgdata:
