<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo -->
  <g transform="translate(80, 80)">
    <rect width="64" height="64" rx="14" fill="#090909" stroke="#00ff41" stroke-width="2"/>
    <path d="M44 12 L20 44 L36 44 L32 56 L52 32 L38 32 Z" fill="#00ff41"/>
  </g>
  <text x="160" y="125" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700" fill="#00ff41">Acortalink</text>

  <!-- Headline -->
  <text x="80" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="52" font-weight="800" fill="#ffffff">Acortador de links</text>
  <text x="80" y="345" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="52" font-weight="800" fill="#00ff41">con SEO y MercadoPago</text>

  <!-- Subtitle -->
  <text x="80" y="410" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#cccccc">5-15x más barato que Bitly. Pago en pesos.</text>

  <!-- Features -->
  <g transform="translate(80, 460)">
    <rect x="0" y="0" width="240" height="40" rx="8" fill="#111" stroke="#222"/>
    <text x="120" y="26" font-family="ui-monospace, monospace" font-size="16" fill="#00ff41" text-anchor="middle">SEO indexable</text>

    <rect x="260" y="0" width="240" height="40" rx="8" fill="#111" stroke="#222"/>
    <text x="380" y="26" font-family="ui-monospace, monospace" font-size="16" fill="#00ff41" text-anchor="middle">QR codes</text>

    <rect x="520" y="0" width="240" height="40" rx="8" fill="#111" stroke="#222"/>
    <text x="640" y="26" font-family="ui-monospace, monospace" font-size="16" fill="#00ff41" text-anchor="middle">Bulk CSV + API</text>

    <rect x="780" y="0" width="240" height="40" rx="8" fill="#111" stroke="#222"/>
    <text x="900" y="26" font-family="ui-monospace, monospace" font-size="16" fill="#00ff41" text-anchor="middle">Dominios propios</text>
  </g>

  <!-- URL -->
  <text x="80" y="570" font-family="ui-monospace, monospace" font-size="20" fill="#555">acortalink.com.ar</text>
